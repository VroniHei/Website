name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-validate:
    name: HTML-Validierung
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: HTML validieren
        run: npx --yes html-validate@8 index.html impressum.html datenschutz.html barrierefreiheit.html 404.html

  links:
    name: Link-Check (intern)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Interne Links & Asset-Pfade prüfen
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--offline --no-progress index.html impressum.html datenschutz.html barrierefreiheit.html"
          fail: true

  lighthouse:
    name: Lighthouse (A11y / SEO / Performance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun

  lighthouse-mobile:
    name: Lighthouse Mobil (informativ)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Lighthouse CI (mobile Emulation, nicht blockierend)
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=lighthouserc.mobile.json || true
      - name: Hauptthread-/CLS-Diagnose (informativ)
        run: node .github/lh-diagnose.cjs

  medien-guard:
    name: Medien-Register-Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Bild-Änderung erzwingt MEDIEN.md-Update
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          changed="$(git diff --name-only "$base...$head")"
          echo "Geänderte Dateien im PR:"; echo "$changed"
          if echo "$changed" | grep -qE '^images/'; then
            if echo "$changed" | grep -qx 'MEDIEN.md'; then
              echo "✓ images/ geändert und MEDIEN.md im selben PR aktualisiert."
            else
              echo "::error::Es wurden Bilder unter images/ geändert, aber MEDIEN.md nicht. Bitte den Medien-Eintrag im selben PR aktualisieren (siehe CLAUDE.md → Medien-Dokumentationspflicht)."
              exit 1
            fi
          else
            echo "✓ Keine Änderung unter images/ — nichts zu prüfen."
          fi
